name: iot_fuel_level
description: IoT Fuel Level Mobile App (Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # HTTP
  dio: ^5.4.3
  # State management
  provider: ^6.1.2
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Real-time Socket.IO
  socket_io_client: ^2.0.3+1
  # QR code scanner
  mobile_scanner: ^5.2.3
  # Date/time formatting
  intl: ^0.19.0
  # File picker (OTA .bin upload)
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
